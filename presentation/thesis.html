<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSDC Thesis</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 80px;
        color: white;
        text-align: center;
      }

      .question {
        font-size: 4rem;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -2px;
        max-width: 900px;
        margin-bottom: 50px;
      }

      .answer {
        font-size: 1.6rem;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.7);
        max-width: 700px;
        line-height: 1.6;
      }

      .code-inline {
        font-family: "SF Mono", "Fira Code", monospace;
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 14px;
        border-radius: 8px;
        font-size: 1.4rem;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="question">
      What if getting GPUs was as easy as<br />
      <span class="code-inline">gpu-dev reserve --gpu-type b200 --gpus 4</span>
    </div>
    <div class="answer">
      A Kubernetes-native platform that gives open source developers<br />
      instant access to GPUs — from T4 to B300 — with one command.
    </div>
  </body>
</html>
