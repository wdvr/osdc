{{- if .Values.registry.ghcr.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-ghcr-config
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: registry-cache
data:
  config.yml.tmpl: |
    version: 0.1
    log:
      level: info
      fields:
        service: registry
    storage:
      filesystem:
        rootdirectory: /var/lib/registry
      cache:
        blobdescriptor: inmemory
      delete:
        enabled: true
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
    proxy:
      remoteurl: https://ghcr.io
      username: GHCR_USERNAME_PLACEHOLDER
      password: GHCR_TOKEN_PLACEHOLDER
---
{{- if and .Values.registry.ghcr.auth.username (not .Values.registry.ghcr.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: registry-ghcr-credentials
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: registry-cache
type: Opaque
stringData:
  GHCR_USERNAME: {{ .Values.registry.ghcr.auth.username | quote }}
  GHCR_TOKEN: {{ .Values.registry.ghcr.auth.token | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ghcr
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: registry-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-cache
      upstream: ghcr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: registry-cache
        upstream: ghcr
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      {{- with .Values.registry.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.registry.ghcr.auth.username .Values.registry.ghcr.auth.existingSecret }}
      initContainers:
        - name: inject-credentials
          image: "busybox:1.36"
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed -e "s/GHCR_USERNAME_PLACEHOLDER/$GHCR_USERNAME/" \
                  -e "s/GHCR_TOKEN_PLACEHOLDER/$GHCR_TOKEN/" \
                  /config-template/config.yml.tmpl > /etc/docker/registry/config.yml
              echo "Registry config generated with credentials"
          env:
            - name: GHCR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ default "registry-ghcr-credentials" .Values.registry.ghcr.auth.existingSecret }}
                  key: GHCR_USERNAME
            - name: GHCR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default "registry-ghcr-credentials" .Values.registry.ghcr.auth.existingSecret }}
                  key: GHCR_TOKEN
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /etc/docker/registry
      {{- end }}
      containers:
        - name: registry
          image: "{{ .Values.registry.ghcr.image.repository }}:{{ .Values.registry.ghcr.image.tag }}"
          ports:
            - containerPort: 5000
              name: registry
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config-template
          configMap:
            name: registry-ghcr-config
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: registry-ghcr-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-ghcr-data
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: registry-cache
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage.class }}
  storageClassName: {{ include "gpu-dev-server.storageClass" . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.registry.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: registry-ghcr
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: registry-cache
  {{- if eq .Values.cloudProvider.name "aws" }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  {{- end }}
spec:
  {{- if eq .Values.cloudProvider.name "aws" }}
  type: LoadBalancer
  {{- else }}
  type: ClusterIP
  {{- end }}
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: registry
  selector:
    app: registry-cache
    upstream: ghcr
{{- end }}
