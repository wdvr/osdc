{{- if .Values.databaseMigration.enabled }}
---
# ConfigMap with schema SQL files
apiVersion: v1
kind: ConfigMap
metadata:
  name: database-schema
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: database-migration
data:
  {{- range $path, $bytes := .Files.Glob "database/schema/*.sql" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
---
# ConfigMap with fixture SQL files
apiVersion: v1
kind: ConfigMap
metadata:
  name: database-fixtures
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: database-migration
data:
  {{- range $path, $bytes := .Files.Glob "database/fixtures/*.sql" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: database-schema-migration
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: database-migration
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: database-migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.databaseMigration.image.repository }}:{{ .Values.databaseMigration.image.tag }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h {{ include "gpu-dev-server.postgresPrimaryService" . }} -U {{ .Values.postgres.auth.username }} -d {{ .Values.postgres.auth.database }}; do
                echo "PostgreSQL is unavailable - sleeping"
                sleep 2
              done
              echo "PostgreSQL is ready!"
          envFrom:
            - secretRef:
                name: {{ include "gpu-dev-server.postgresSecretName" . }}
      containers:
        - name: migrate
          image: "{{ .Values.databaseMigration.image.repository }}:{{ .Values.databaseMigration.image.tag }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "=========================================="
              echo "Database Schema Migration"
              echo "=========================================="
              echo ""

              echo "Applying schema files..."
              for file in $(ls /schema/*.sql | sort); do
                if [ -f "$file" ]; then
                  echo "  → $(basename $file)"
                  PGPASSWORD="$POSTGRES_PASSWORD" psql \
                    -h {{ include "gpu-dev-server.postgresPrimaryService" . }} \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    -v ON_ERROR_STOP=1 \
                    -f "$file" || {
                      echo "ERROR: Failed to apply $(basename $file)"
                      exit 1
                    }
                fi
              done

              echo ""
              echo "Applying fixture data..."
              for file in $(ls /fixtures/*.sql | sort); do
                if [ -f "$file" ]; then
                  echo "  → $(basename $file)"
                  PGPASSWORD="$POSTGRES_PASSWORD" psql \
                    -h {{ include "gpu-dev-server.postgresPrimaryService" . }} \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    -v ON_ERROR_STOP=1 \
                    -f "$file" || {
                      echo "ERROR: Failed to apply $(basename $file)"
                      exit 1
                    }
                fi
              done

              echo ""
              echo "=========================================="
              echo "Migration completed successfully!"
              echo "=========================================="
          envFrom:
            - secretRef:
                name: {{ include "gpu-dev-server.postgresSecretName" . }}
          volumeMounts:
            - name: schema
              mountPath: /schema
            - name: fixtures
              mountPath: /fixtures
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: schema
          configMap:
            name: database-schema
        - name: fixtures
          configMap:
            name: database-fixtures
{{- end }}
