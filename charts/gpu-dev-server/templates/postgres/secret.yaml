{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpu-dev-server.postgresSecretName" . }}
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: postgres
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgres.auth.username | b64enc | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | b64enc | quote }}
  {{- if .Values.postgres.auth.password }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
---
{{- if gt (int .Values.postgres.replica.replicas) 0 }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-replication-credentials
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: postgres
type: Opaque
data:
  REPLICATION_USER: {{ "replicator" | b64enc | quote }}
  {{- if .Values.postgres.auth.replicationPassword }}
  REPLICATION_PASSWORD: {{ .Values.postgres.auth.replicationPassword | b64enc | quote }}
  {{- else }}
  REPLICATION_PASSWORD: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
