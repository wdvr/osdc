{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: postgres
    role: primary
spec:
  serviceName: postgres-primary-headless
  replicas: {{ .Values.postgres.primary.replicas }}
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      serviceAccountName: postgres-service-account
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-config
          image: busybox:1.36
          securityContext:
            runAsUser: 999
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config/postgresql.conf /var/lib/postgresql/data-config/postgresql.conf
              cp /config/pg_hba.conf /var/lib/postgresql/data-config/pg_hba.conf
              chmod 600 /var/lib/postgresql/data-config/*.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-writable
              mountPath: /var/lib/postgresql/data-config
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: {{ include "gpu-dev-server.postgresSecretName" . }}
            {{- if gt (int .Values.postgres.replica.replicas) 0 }}
            - secretRef:
                name: postgres-replication-credentials
            {{- end }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "-c"
            - "config_file=/var/lib/postgresql/data-config/postgresql.conf"
            - "-c"
            - "hba_file=/var/lib/postgresql/data-config/pg_hba.conf"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: config-writable
              mountPath: /var/lib/postgresql/data-config
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          {{- if gt (int .Values.postgres.replica.replicas) 0 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    # Wait for postgres to accept connections
                    for i in $(seq 1 30); do
                      if pg_isready -U $POSTGRES_USER -d $POSTGRES_DB 2>/dev/null; then
                        break
                      fi
                      sleep 2
                    done
                    # Create replicator user if it doesn't exist (idempotent)
                    psql -U $POSTGRES_USER -d $POSTGRES_DB -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='$REPLICATION_USER') THEN CREATE ROLE $REPLICATION_USER WITH REPLICATION LOGIN PASSWORD '$REPLICATION_PASSWORD'; END IF; END \$\$;" 2>/dev/null || true
                    # Ensure PGMQ extension exists
                    psql -U $POSTGRES_USER -d $POSTGRES_DB -c "CREATE EXTENSION IF NOT EXISTS pgmq; CREATE EXTENSION IF NOT EXISTS pg_partman;" 2>/dev/null || true
          {{- end }}
          resources:
            {{- toYaml .Values.postgres.primary.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
                - -d
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
                - -d
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: postgres-primary-config
        - name: config-writable
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: postgres-init-script
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.class }}
        storageClassName: {{ include "gpu-dev-server.storageClass" . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.postgres.size }}
{{- end }}
