{{- if and .Values.postgres.enabled (gt (int .Values.postgres.replica.replicas) 0) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: postgres
    role: replica
spec:
  serviceName: postgres-replica-headless
  replicas: {{ .Values.postgres.replica.replicas }}
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        role: replica
    spec:
      serviceAccountName: postgres-service-account
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-replica
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          securityContext:
            runAsUser: 999
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              if [ -z "$(ls -A /var/lib/postgresql/data/pgdata 2>/dev/null)" ]; then
                echo "Initializing replica from primary..."
                until pg_isready -h postgres-primary -p 5432 -U {{ .Values.postgres.auth.username }}; do
                  echo "Waiting for primary to be ready..."
                  sleep 2
                done
                PGPASSWORD=$REPLICATION_PASSWORD pg_basebackup \
                  -h postgres-primary \
                  -p 5432 \
                  -U replicator \
                  -D /var/lib/postgresql/data/pgdata \
                  -Fp -Xs -P -R
                echo "Base backup complete. Replica initialized."
              else
                echo "Data directory exists. Skipping initialization."
              fi
              cp /config/postgresql.conf /var/lib/postgresql/data-config/postgresql.conf
              cp /config/pg_hba.conf /var/lib/postgresql/data-config/pg_hba.conf
              chmod 600 /var/lib/postgresql/data-config/*.conf
          envFrom:
            - secretRef:
                name: postgres-replication-credentials
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /config
            - name: config-writable
              mountPath: /var/lib/postgresql/data-config
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "-c"
            - "config_file=/var/lib/postgresql/data-config/postgresql.conf"
            - "-c"
            - "hba_file=/var/lib/postgresql/data-config/pg_hba.conf"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: config-writable
              mountPath: /var/lib/postgresql/data-config
          resources:
            {{- toYaml .Values.postgres.replica.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
                - -d
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username | quote }}
                - -d
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: postgres-replica-config
        - name: config-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.class }}
        storageClassName: {{ include "gpu-dev-server.storageClass" . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.postgres.size }}
{{- end }}
