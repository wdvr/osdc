{{- if .Values.apiService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-service-config
  namespace: {{ include "gpu-dev-server.controlplaneNamespace" . }}
  labels:
    {{- include "gpu-dev-server.labels" . | nindent 4 }}
    app: api-service
data:
  QUEUE_NAME: {{ .Values.apiService.config.queueName | quote }}
  API_KEY_TTL_HOURS: {{ .Values.apiService.config.apiKeyTtlHours | quote }}
  ALLOWED_AWS_ROLE: {{ .Values.apiService.config.allowedAwsRole | quote }}
  AWS_REGION: {{ .Values.cloudProvider.region | quote }}
  {{- if .Values.apiService.config.diskContentsBucket }}
  DISK_CONTENTS_BUCKET: {{ .Values.apiService.config.diskContentsBucket | quote }}
  {{- end }}
  {{- if .Values.apiService.config.localDevUser }}
  LOCAL_DEV_USER: {{ .Values.apiService.config.localDevUser | quote }}
  {{- end }}
  AUTH_METHOD: {{ default "aws" .Values.auth.method | quote }}
  {{- if .Values.auth.oidc.issuerUrl }}
  OIDC_ISSUER_URL: {{ .Values.auth.oidc.issuerUrl | quote }}
  {{- end }}
  {{- if .Values.auth.oidc.audience }}
  OIDC_AUDIENCE: {{ .Values.auth.oidc.audience | quote }}
  {{- end }}
{{- end }}
