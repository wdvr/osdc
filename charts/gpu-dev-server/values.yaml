# GPU Dev Server Helm Chart - Default Values
# Override with values-aws.yaml or values-local.yaml for environment-specific settings

global:
  prefix: "gpu-dev"
  environment: "production"

namespaces:
  create: true  # Set to false when namespaces are managed externally (e.g., by Terraform)
  controlplane: "gpu-controlplane"
  workloads: "gpu-dev"

# Storage configuration - override per cloud provider
storage:
  createClass: true  # Set to false when StorageClass is managed externally (e.g., by Terraform)
  useEmptyDir: false  # Set to true when no StorageClass/provisioner is available (data is ephemeral!)
  class: "gp3"  # AWS default; set to "" for local (uses default)
  postgres:
    size: "100Gi"
  registry:
    size: "50Gi"

# PostgreSQL configuration
postgres:
  enabled: true
  image:
    repository: "ghcr.io/pgmq/pg18-pgmq"
    tag: "v1.8.1"
    pullPolicy: IfNotPresent
  auth:
    database: "gpudev"
    username: "gpudev"
    password: ""  # Set via --set or external secret
    replicationPassword: ""  # Set via --set; auto-generated if empty
    existingSecret: ""
    existingSecretKey: "POSTGRES_PASSWORD"
  primary:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
  replica:
    replicas: 1
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  nodeSelector:
    NodeType: "cpu"
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "cpu-only"
      effect: "NoSchedule"

# Registry cache configuration
registry:
  ghcr:
    enabled: true
    image:
      repository: "registry"
      tag: "2"
    auth:
      username: ""
      token: ""
      existingSecret: ""
  dockerhub:
    enabled: true
    image:
      repository: "registry"
      tag: "2"
  native:
    enabled: true
    image:
      repository: "registry"
      tag: "2"
    tls:
      enabled: true
      cert: ""  # TLS certificate content (PEM); injected via --set or helm_release
      key: ""   # TLS private key content (PEM); injected via --set or helm_release
      existingSecret: ""  # Use pre-existing TLS secret instead of creating one
  nodeSelector:
    NodeType: "cpu"
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "cpu-only"
      effect: "NoSchedule"

# API Service configuration
apiService:
  enabled: true
  replicas: 2
  image:
    repository: ""  # Set to your registry/api-service
    tag: "latest"
    pullPolicy: Always
  config:
    queueName: "gpu_reservations"
    apiKeyTtlHours: "2"
    allowedAwsRole: "SSOCloudDevGpuReservation"
    diskContentsBucket: ""  # Set in AWS values
    localDevUser: ""  # Set for local dev only
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: "LoadBalancer"
    port: 80
    targetPort: 8000
    nodePort: null  # Set when type=NodePort (e.g., 30080 for ALB routing)
  serviceAccount:
    annotations: {}
  nodeSelector:
    NodeType: "cpu"
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "cpu-only"
      effect: "NoSchedule"

# Reservation Processor configuration
reservationProcessor:
  enabled: true
  replicas: 1
  image:
    repository: ""  # Set to your registry/reservation-processor
    tag: "latest"
    pullPolicy: Always
  config:
    queueName: "gpu_reservations"
    pollIntervalSeconds: "5"
    visibilityTimeoutSeconds: "900"
    batchSize: "1"
    maxReservationHours: "168"
    defaultTimeoutHours: "4"
    gpuDevContainerImage: "pytorch/pytorch:2.8.0-cuda12.9-cudnn9-devel"
    imagePullPolicy: "Always"
    processorVersion: "0.4.0"
    minCliVersion: "0.0.1"
    diskContentsBucket: ""  # Set in AWS values
    buildkitRegistryUrl: ""  # Override for non-AWS (defaults to ECR_REPOSITORY_URL on AWS)
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  serviceAccount:
    annotations: {}
  nodeSelector:
    NodeType: "cpu"
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "cpu-only"
      effect: "NoSchedule"

# Availability Updater CronJob configuration
availabilityUpdater:
  enabled: true
  schedule: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  image:
    repository: ""  # Set to your registry/availability-updater
    tag: "latest"
    pullPolicy: Always
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  serviceAccount:
    annotations: {}
  nodeSelector:
    NodeType: "cpu"

# Reservation Expiry CronJob configuration
reservationExpiry:
  enabled: true
  schedule: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  image:
    repository: ""  # Set to your registry/reservation-expiry
    tag: "latest"
    pullPolicy: Always
  config:
    warningMinutes: "30"
    gracePeriodSeconds: "120"
    diskContentsBucket: ""  # Set in AWS values
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  serviceAccount:
    annotations: {}
  nodeSelector:
    NodeType: "cpu"
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "cpu-only"
      effect: "NoSchedule"

# BuildKit service account for Dockerfile builds
buildkit:
  enabled: true
  serviceAccount:
    annotations: {}  # Set eks.amazonaws.com/role-arn for AWS

# GPU Dev namespace RBAC
gpuDev:
  rbac:
    enabled: true
  k8sDirect:
    enabled: false  # Enable for k8s-direct CLI mode (Jobs-based, no API service)
    registryRepo: ""  # ECR repo for built dev images (e.g. 308535385114.dkr.ecr.us-east-2.amazonaws.com/osdc-dev-images)

# Image pre-puller DaemonSet (pulls GPU dev image on all GPU nodes)
imagePrepuller:
  enabled: false  # Enable in production with actual image
  image: ""  # GPU dev container image to pre-pull
  nodeSelector:
    NodeType: "gpu"
    kubernetes.io/arch: "amd64"

# NVIDIA GPU Operator / Device Plugin
nvidia:
  devicePlugin:
    enabled: true

# Database migration job
databaseMigration:
  enabled: true
  image:
    repository: "ghcr.io/pgmq/pg18-pgmq"
    tag: "v1.8.1"

# Cloud provider configuration (set in values-aws.yaml or values-gcp.yaml)
cloudProvider:
  name: ""  # "aws" or "gcp" or "local"
  region: ""
  aws:
    eksClusterName: ""
    primaryAvailabilityZone: ""
    efsSecurityGroupId: ""
    efsSubnetIds: ""
    ccacheSharedEfsId: ""
    ecrRepositoryUrl: ""
  gcp:
    gkeClusterName: ""
    zone: ""
    projectId: ""
